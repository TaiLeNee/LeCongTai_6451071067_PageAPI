services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [fb_api_network]
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks: [fb_api_network]
    volumes: [kafka_data:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    networks: [fb_api_network]
    command: >
      bash -c "cub kafka-ready -b kafka:9092 1 40 &&
      kafka-topics --create --topic raw_events --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists &&
      kafka-topics --create --topic reply_commands --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists &&
      kafka-topics --create --topic send_failed --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists &&
      kafka-topics --create --topic send_retry --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists &&
      kafka-topics --create --topic dead_letter --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists"
    entrypoint: [""]
    container_name: kafka-init

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8090:8080"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks: [fb_api_network]

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command: --kafka.server=kafka:9092 --topic.filter=".*" --group.filter=".*"
    ports: ["9308:9308"]
    depends_on:
      kafka:
        condition: service_healthy
    networks: [fb_api_network]

  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: fb_api
      POSTGRES_USER: fb_user
      POSTGRES_PASSWORD: fb_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    networks: [fb_api_network]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "fb_user", "-d", "fb_api"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  webhook-service:
    build:
      context: .
      dockerfile: ./services/webhook-service/Dockerfile
    ports: ["3001:3001"]
    environment:
      Kafka__BootstrapServers: kafka:9092
      Facebook__AppSecret: ${FACEBOOK_APP_SECRET}
      Facebook__VerifyToken: ${FACEBOOK_VERIFY_TOKEN}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [fb_api_network]

  core-service:
    build:
      context: .
      dockerfile: ./services/core-service/Dockerfile
    ports: ["3002:3002"]
    environment:
      Kafka__BootstrapServers: kafka:9092
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Gemini__Model: ${GEMINI_MODEL:-gemini-2.0-flash}
      AI__Provider: Gemini
      Retry__MaxRetryCount: 3
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [fb_api_network]

  backend-api:
    build:
      context: .
      dockerfile: ./services/backend-api/Dockerfile
    ports: ["3000:3000"]
    environment:
      Kafka__BootstrapServers: kafka:9092
      Facebook__PageAccessToken: ${FACEBOOK_PAGE_ACCESS_TOKEN}
      Admin__ApiKey: ${ADMIN_API_KEY:-dev-admin-key}
      ConnectionStrings__DefaultConnection: Host=postgres;Database=fb_api;Username=fb_user;Password=fb_password;Maximum Pool Size=20;Minimum Pool Size=5;Connection Idle Lifetime=300;Connection Pruning Interval=10
      CircuitBreaker__FailureThreshold: 0.5
      CircuitBreaker__BreakDurationSeconds: 60
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks: [fb_api_network]

  retry-service:
    build:
      context: .
      dockerfile: ./services/retry-service/Dockerfile
    ports: ["3003:3003"]
    environment:
      Kafka__BootstrapServers: kafka:9092
      Retry__MaxRetryCount: 5
      Retry__BaseDelaySeconds: 1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks: [fb_api_network]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on: [kafka-exporter]
    networks: [fb_api_network]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  alertmanager:
    image: prom/alertmanager:latest
    ports: ["9093:9093"]
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks: [fb_api_network]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  fb_api_network:
    driver: bridge

volumes:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  postgres_data:
  prometheus_data:
